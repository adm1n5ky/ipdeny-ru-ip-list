name: Update IPDeny Zones

on:
  schedule:
    - cron: '11 11 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest zones
        run: |
          set -e

          curl -fsSL \
            "https://www.ipdeny.com/ipblocks/data/aggregated/ru-aggregated.zone" \
            -o ru-aggregated-ipv4.zone

          curl -fsSL \
            "https://www.ipdeny.com/ipv6/ipaddresses/aggregated/ru-aggregated.zone" \
            -o ru-aggregated-ipv6.zone

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ru-aggregated-ipv4.zone ru-aggregated-ipv6.zone

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Auto-update RU IP zones: $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          git push
